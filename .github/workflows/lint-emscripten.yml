# SPDX-License-Identifier: MPL-2.0
name: Lint Emscripten
on:
  workflow_call:

env:
  CMAKE_COMMON: >-
    -G Ninja
    -DPRISM_ENABLE_TESTS=OFF
    -DPRISM_ENABLE_DEMOS=OFF
    -DPRISM_ENABLE_LEGACY_BACKENDS=ON
    -DPRISM_ENABLE_SHIMS=ON
    -DPRISM_ENABLE_LINTING=ON

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
      - name: Lint all configurations
        run: |
          EMSDK_TIDY="${EMSDK}/upstream/bin/clang-tidy"
          if [ ! -x "${EMSDK_TIDY}" ]; then
            echo "ERROR: emsdk clang-tidy not found at ${EMSDK_TIDY}" >&2
            ls -la "${EMSDK}/upstream/bin/" || true
            exit 1
          fi
          for bt in Release Debug; do
            config=$(echo "$bt" | tr '[:upper:]' '[:lower:]')
            emcmake cmake -B "build-${config}" ${{ env.CMAKE_COMMON }} \
              -DCMAKE_BUILD_TYPE="$bt" \
              -DCMAKE_C_CLANG_TIDY="${EMSDK_TIDY}" \
              -DCMAKE_CXX_CLANG_TIDY="${EMSDK_TIDY}" \
              -DPRISM_ENABLE_GDEXTENSION=OFF
            cmake --build "build-${config}"
          done
