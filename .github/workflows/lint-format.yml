# SPDX-License-Identifier: MPL-2.0
name: Lint clang-format
on:
  workflow_call:

jobs:
  clang-format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
      - name: Install clang-format 20
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh all
          sudo apt-get install -y clang-format-20
          sudo update-alternatives --install /usr/bin/clang-format clang-format  /usr/bin/clang-format-20 100
      - name: Check formatting
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files '*.c' '*.cc' '*.cpp' '*.cxx' '*.h' '*.hh' '*.hpp' '*.hxx')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No source files to check."
            exit 0
          fi
          printf '%s\n' "${files[@]}" | xargs clang-format --dry-run --Werror
