# SPDX-License-Identifier: MPL-2.0
name: Lint GDExtension
on:
  workflow_call:

jobs:
  linux-web:
    strategy:
      fail-fast: false
      matrix:
        target-type: [template_debug, template_release]
        target:
          - { platform: linux, arch: x86_64, os: ubuntu-latest,    system: x86_64-linux,  shell: gdextension-lint }
          - { platform: linux, arch: arm64,  os: ubuntu-24.04-arm, system: aarch64-linux, shell: gdextension-lint }
          - { platform: web,   arch: wasm32, os: ubuntu-latest,    system: x86_64-linux,  shell: emscripten-lint }
    runs-on: ${{ matrix.target.os }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          diagnostic-endpoint: ""
          extra-conf: |
            substituters = https://cache.nixos.org
            experimental-features = nix-command flakes
      - name: Lint and build
        env:
          PRISM_GDEXT_LINT: "ON"
        run: |
          nix develop --ignore-environment --keep HOME --keep PRISM_GDEXT_LINT ".#devShells.${{ matrix.target.system }}.${{ matrix.target.shell }}" -c ./tools/gdextension-nix.sh "${{ matrix.target.platform }}" "${{ matrix.target.arch }}" "${{ matrix.target-type }}"
  native:
    strategy:
      fail-fast: false
      matrix:
        target-type: [template_debug, template_release]
        target:
          - { platform: windows, arch: x86_64, os: windows-latest, msvc: amd64 }
          - { platform: windows, arch: arm64,  os: windows-latest, msvc: amd64_arm64 }
          - { platform: macos,   arch: arm64,  os: macos-26 }
          - { platform: macos,   arch: x86_64, os: macos-26 }
          - { platform: android, arch: x86_64, os: ubuntu-latest }
          - { platform: android, arch: arm64,  os: ubuntu-latest }
          - { platform: ios,     arch: arm64,  os: macos-26 }
    runs-on: ${{ matrix.target.os }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          submodules: true
      - name: install ninja-build
        if: matrix.target.platform == 'android'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
      - name: install LLVM
        if: matrix.target.platform == 'macos' || matrix.target.platform == 'ios'
        run: |
          brew install llvm ninja
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
      - name: MSVC setup
        if: matrix.target.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.target.msvc }}
      - name: NDK setup
        if: matrix.target.platform == 'android'
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r29
          local-cache: true
      - name: Use NDK clang-tidy on PATH
        if: matrix.target.platform == 'android'
        run: |
          echo "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> "$GITHUB_PATH"
      - name: Lint and build
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          PRISM_GDEXT_LINT: "ON"
        run: |
          ./tools/gdextension-native.sh "${{ matrix.target.platform }}" "${{ matrix.target.arch }}" "${{ matrix.target-type }}"
