# SPDX-License-Identifier: MPL-2.0
name: Lint iOS
on:
  workflow_call:

env:
  CMAKE_COMMON: >-
    -G Ninja
    -DPRISM_ENABLE_TESTS=OFF
    -DPRISM_ENABLE_DEMOS=OFF
    -DPRISM_ENABLE_LEGACY_BACKENDS=ON
    -DPRISM_ENABLE_SHIMS=ON
    -DPRISM_ENABLE_LINTING=ON

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install LLVM (clang-tidy)
        run: |
          brew install llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
      - name: Lint all configurations
        run: |
          export PATH="$(brew --prefix llvm)/bin:$PATH"
          clang-tidy --version
          for shared in ON OFF; do
            linkage=$( [ "$shared" = "ON" ] && echo "dynamic" || echo "static" )
            for bt in Release Debug; do
              config=$(echo "$bt" | tr '[:upper:]' '[:lower:]')
              cmake -B "build-${linkage}-${config}" ${{ env.CMAKE_COMMON }} \
                -DCMAKE_BUILD_TYPE="$bt" \
                -DCMAKE_SYSTEM_NAME=iOS \
                -DCMAKE_OSX_ARCHITECTURES=arm64 \
                -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
                -DBUILD_SHARED_LIBS="$shared" \
                -DPRISM_ENABLE_GDEXTENSION=OFF
              cmake --build "build-${linkage}-${config}" --target prism
            done
          done
  lint-simulator:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install LLVM (clang-tidy)
        run: |
          brew install llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
      - name: Lint all configurations
        run: |
          export PATH="$(brew --prefix llvm)/bin:$PATH"
          clang-tidy --version
          for shared in ON OFF; do
            linkage=$( [ "$shared" = "ON" ] && echo "dynamic" || echo "static" )
            for bt in Release Debug; do
              config=$(echo "$bt" | tr '[:upper:]' '[:lower:]')
              cmake -B "build-${linkage}-${config}" ${{ env.CMAKE_COMMON }} \
                -DCMAKE_BUILD_TYPE="$bt" \
                -DCMAKE_SYSTEM_NAME=iOS \
                -DCMAKE_OSX_SYSROOT=iphonesimulator \
                -DCMAKE_OSX_ARCHITECTURES=arm64 \
                -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
                -DBUILD_SHARED_LIBS="$shared" \
                -DPRISM_ENABLE_GDEXTENSION=OFF
              cmake --build "build-${linkage}-${config}" --target prism
            done
          done
