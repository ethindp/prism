import com.android.build.api.artifact.SingleArtifact
plugins {
    id "com.android.library" version "9.2.1"
    id "com.diffplug.spotless" version "8.4.0"
}
layout.buildDirectory.set(layout.projectDirectory.dir("build/android/gradle"))
dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.5"
    implementation "com.ibm.icu:icu4j:78.3"
}
allprojects {
    plugins.withId('java-base') {
        java {
            toolchain {
                languageVersion = JavaLanguageVersion.of(25)
            }
        }
    }
}
def  gitVersion = providers.exec {
    commandLine 'git', 'describe', '--tags', '--always', '--dirty'
}.standardOutput.asText.map {
    it.trim().replaceFirst('^v', '')
}
def  cmakeVersion = providers.fileContents(layout.projectDirectory.file('CMakeLists.txt'))
        .asText.map {text ->
    def  match = text =~ /project\s*\(\s*\w+\s+VERSION\s+(\d+\.\d+\.\d+)/
    match.find() ? (match.group = 1) : null
}
def  prismVersion = gitVersion.orElse(cmakeVersion).orElse('0.0.0')
android {
    lint {
        textReport = true
        abortOnError = true
        warningsAsErrors = true
        checkDependencies = true
        explainIssues = true
        xmlReport = true
        htmlReport = true
        sarifReport = true
    }
    namespace = 'com.github.ethindp.prism'
    compileSdk = 36
    ndkVersion = '30.0.14904198'
    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_21
        targetCompatibility = JavaVersion.VERSION_21
        coreLibraryDesugaringEnabled = true
    }
    defaultConfig {
        minSdk 26
        ndk {
            abiFilters 'arm64-v8a', 'x86_64'
        }
        externalNativeBuild {
            cmake {
                targets 'prism'
                arguments '-DPRISM_ENABLE_TESTS=OFF', '-DPRISM_ENABLE_GDEXTENSION=OFF'
            }
        }
    }
    sourceSets {
        main {
            manifest.srcFile 'source/AndroidManifest.xml'
            java.srcDirs = ['source/backends/android', 'third_party/djinni/support/java']
        }
    }
    externalNativeBuild {
        cmake {
            path file('CMakeLists.txt')
            buildStagingDirectory = file('build/android/.cxx')
            version = '4.1.2'
        }
    }
}
def  bundleTaskProviders = []
androidComponents {
    onVariants(selector().all()) {variant ->
        def  variantName = variant.name.capitalize()
        def  buildType = variant.buildType
        def  abis = android.defaultConfig.ndk.abiFilters.toList()
        def  templateDir = file('android/templates')
        def  aarProvider = variant.artifacts.get(SingleArtifact.AAR.INSTANCE)
        def  bundleTask = tasks.register("bundleNativeSDK${variantName}", Zip) {
            dependsOn "assemble${variantName}"
            def  sdkDir = layout.buildDirectory.dir("outputs/sdk/${buildType}")
            def  genDir = layout.buildDirectory.dir("generated/sdk/${buildType}")
            archiveFileName = prismVersion.map {v ->
                "prism-android-sdk-${v}-${buildType}.zip"
            }
            destinationDirectory = sdkDir
            inputs.dir(templateDir).withPropertyName("templateDir")
            inputs.property("version", prismVersion)
            inputs.property("buildType", buildType)
            inputs.property("abis", abis)
            doFirst {
                def  gen = genDir.get().asFile
                def  vars = [
                        '@VERSION@': prismVersion.get(),
                        '@BUILD_TYPE@': buildType,
                        '@ABIS@': abis.inspect()
                        ]
                templateDir.eachFileRecurse {src ->
                    if (src.isFile() && src.name.endsWith('.in')) {
                        def  rel = templateDir.toPath().relativize(src.toPath()).toString()
                        def  destName = rel.replaceFirst(/\.in$/, '')
                        def  dest = new File(gen, destName)
                        dest.parentFile.mkdirs()
                        def  content = src.text
                        vars.each {k, v ->
                            content = content.replace(k, v)
                        }
                        dest.text = content
                    }
                }
            }
            from("include") {
                into "include"
            }
            from(zipTree(aarProvider)) {
                include "jni/**/*.so"
                eachFile {
                    it.path = it.path.replaceFirst("jni/", "lib/")
                }
                includeEmptyDirs = false
            }
            from(genDir) {
                into "."
            }
        }
        bundleTaskProviders << bundleTask
        tasks.matching {
            it.name == "assemble${variantName}"
        }.configureEach {
            finalizedBy bundleTask
        }
    }
}
tasks.register("bundleAllNativeSDKs") {
    dependsOn bundleTaskProviders
    group = "build"
}
spotless {
    groovyGradle {
        target '**/*.gradle'
        greclipse()
        leadingTabsToSpaces(4)
        trimTrailingWhitespace()
        endWithNewline()
        licenseHeader('// SPDX-License-Identifier: MPL-2.0\n', '^.')
    }
    java {
        target 'source/**/*.java', 'tests/**/*.java'
        cleanthat()
        googleJavaFormat()
        leadingTabsToSpaces(4)
        trimTrailingWhitespace()
        endWithNewline()
        licenseHeader "// SPDX-License-Identifier: MPL-2.0\n"
        removeUnusedImports()
        formatAnnotations()
    }
}