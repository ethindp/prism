                    }
                    api30AospArm64 {
                        device = "Pixel 6"
                        apiLevel = 30
                        systemImageSource = "google_apis"
                        require64Bit = true
                        testedAbi = "arm64-v8a"
                    }
                    api31AospArm64 {
                        device = "Pixel 6"
