                        apiLevel = 26
                        systemImageSource = "google_apis"
                        require64Bit = true
                        testedAbi = "arm64-v8a"
                    }
                    api27AospArm64 {
                        device = "Pixel 6"
                        apiLevel = 27
                        systemImageSource = "google_apis"
                        require64Bit = true
                        testedAbi = "arm64-v8a"
